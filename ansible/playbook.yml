- name: Configure EC2
  hosts: web
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install nginx
      apt:
        name: nginx
        state: present
    - name: Enable Nginx status
      copy:
       dest: /etc/nginx/conf.d/status.conf
       content: |
        server {
         listen 8080;

        location /nginx_status {
          stub_status;
          allow 127.0.0.1;
          deny all;
        }
    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: true

- name: Setup Monitoring Stack
  hosts: web
  become: yes

  tasks:

    - name: Update apt
      apt:
        update_cache: yes
    - name: Download Nginx Exporter
      get_url:
        url: https://github.com/nginxinc/nginx-prometheus-exporter/releases/download/v1.3.0/nginx-prometheus-exporter_1.3.0_linux_amd64.tar.gz
        dest: /tmp/nginx_exporter.tar.gz
    - name: Extract exporter
      unarchive:
       src: /tmp/nginx_exporter.tar.gz
       dest: /tmp/
       remote_src: yes

    - name: Move exporter binary
      command: mv /tmp/nginx-prometheus-exporter /usr/local/bin/

    - name: Run Nginx exporter
      shell: |
        nohup nginx-prometheus-exporter \
         -nginx.scrape-uri http://localhost:8080/nginx_status &
    # ------------------------
    # Install Node Exporter
    # ------------------------
    - name: Install Node Exporter
      apt:
        name: prometheus-node-exporter
        state: present

    - name: Start Node Exporter
      service:
        name: prometheus-node-exporter
        state: started
        enabled: yes

  
- name: Configure Monitoring server
  hosts: monitor
  become: yes
  tasks:
    - name: Update apt
      apt:
        update_cache: yes
    - name: Install Grafana
      apt:
        name: grafana
        state: present

    - name: Start Grafana
      service:
        name: grafana-server
        state: started
        enabled: yes
    - name: Configure Prometheus
      copy:
       dest: /etc/prometheus/prometheus.yml
       content |
         global:
          scrape_interval: 15s

          scrape_configs:
            - job_name: 'nodes'
              static_configs:
               - targets:
{% for host in groups['web'] %}
              - '{{ host }}:9100'
{% endfor %}
        
           - job_name: 'nginx'
             static_configs:
              - targets:
{% for host in groups['app'] %}
                  - '{{ host }}:9113'
{% endfor %}
      - name: Restart Prometheus
        service:
          name: prometheus
          state: Restarted
          enabled: yes