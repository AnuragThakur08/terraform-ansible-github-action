- name: Configure EC2
  hosts: web
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: true
- name: Setup Monitoring Stack
  hosts: all
  become: yes

  tasks:

    - name: Update apt
      apt:
        update_cache: yes

    # ------------------------
    # Install Node Exporter
    # ------------------------
    - name: Install Node Exporter
      apt:
        name: prometheus-node-exporter
        state: present

    - name: Start Node Exporter
      service:
        name: prometheus-node-exporter
        state: started
        enabled: yes

    # ------------------------
    # Install Prometheus
    # ------------------------
    - name: Install Prometheus
      apt:
        name: prometheus
        state: present

    - name: Configure Prometheus
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: 'node'
              static_configs:
                - targets: ['localhost:9100']

    - name: Restart Prometheus
      service:
        name: prometheus
        state: restarted
        enabled: yes

    # ------------------------
    # Install Grafana
    # ------------------------
    - name: Install dependencies
      apt:
        name: apt-transport-https
        state: present

    - name: Add Grafana GPG key
      shell: |
        wget -q -O - https://packages.grafana.com/gpg.key | apt-key add -

    - name: Add Grafana repo
      shell: |
        echo "deb https://packages.grafana.com/oss/deb stable main" > /etc/apt/sources.list.d/grafana.list

    - name: Update apt
      apt:
        update_cache: yes

    - name: Install Grafana
      apt:
        name: grafana
        state: present

    - name: Start Grafana
      service:
        name: grafana-server
        state: started
        enabled: yes